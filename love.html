<!DOCTYPE html>
<html lang="si">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සංකල්ප - අපරිමිත සෙනෙහස ❤️</title>
    <!-- Modern Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Abhaya+Libre:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --primary: #ff4a6e;
            --primary-glow: rgba(255, 74, 110, 0.4);
            --secondary: #fce4ec;
            --glass-bg: rgba(0, 0, 0, 0.6);
            /* Darker for clarity */
            --font-family: 'Outfit', sans-serif;
            --font-sinhala: 'Abhaya Libre', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: url('silhouette.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: var(--font-family);
            color: white;
            transition: background 1s ease;
        }

        body.dark-mode {
            background-image: none !important;
            background-color: #000000 !important;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Deep overlay to show text clearly */
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.5) 0%, rgba(0, 0, 0, 0.8) 100%);
            z-index: 1;
            transition: opacity 1s ease;
        }

        body.dark-mode .overlay {
            opacity: 0;
        }

        #particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            perspective: 1500px;
        }

        /* Enchanted Heart */
        .enchanted-heart {
            width: 140px;
            height: 140px;
            position: relative;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 0 20px var(--primary-glow));
            z-index: 11;
        }

        .enchanted-heart:hover {
            transform: scale(1.15) rotate(5deg);
        }

        .enchanted-heart svg {
            width: 100%;
            height: 100%;
            fill: var(--primary);
            animation: beat 1.5s infinite ease-in-out;
            filter: drop-shadow(0 0 10px var(--primary));
        }

        .heart-aura {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, var(--primary-glow), transparent 70%);
            border-radius: 50%;
            animation: pulse-aura 3s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes beat {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 10px var(--primary));
            }

            50% {
                transform: scale(1.1);
                filter: drop-shadow(0 0 30px var(--primary));
            }
        }

        @keyframes pulse-aura {

            0%,
            100% {
                opacity: 0.3;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1.4);
            }
        }

        /* Mystery Card */
        .mystery-card {
            position: absolute;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 40px;
            width: 90%;
            max-width: 550px;
            text-align: center;
            opacity: 0;
            transform: translateY(50px) scale(0.9);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            visibility: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
        }

        .mystery-card.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            visibility: visible;
        }

        .mystery-card h1 {
            color: var(--primary);
            font-family: var(--font-sinhala);
            font-size: 2.5rem;
            margin-bottom: 30px;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255, 74, 110, 0.4);
        }

        .message-content {
            font-family: var(--font-sinhala);
            font-size: 1.45rem;
            line-height: 1.7;
            color: #ffffff;
            /* White for contrast */
            margin-bottom: 35px;
            text-align: center;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: keep-all;
            display: block;
            min-height: 120px;
            padding: 0 10px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .signature {
            font-style: italic;
            opacity: 0.9;
            font-size: 0.95rem;
            margin-top: 25px;
            color: var(--secondary);
        }

        .instruction {
            margin-top: 30px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: breathe 3s infinite;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0, 0, 0, 1);
        }

        @keyframes breathe {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), #ff758c);
            border: none;
            padding: 14px 35px;
            border-radius: 50px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(255, 74, 110, 0.4);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 30px rgba(255, 74, 110, 0.6);
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            width: 100%;
            margin-top: 20px;
        }

        /* Gallery Section Overlay */
        .gallery-section {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(25px);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 100px 20px 60px;
            overflow-y: auto;
        }

        .gallery-section.active {
            display: flex;
            animation: fadeInReveal 0.5s ease-out forwards;
        }

        @keyframes fadeInReveal {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .quote-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 74, 110, 0.2);
            border-radius: 24px;
            padding: 35px;
            text-align: center;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            gap: 25px;
        }

        .quote-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 74, 110, 0.15);
            border-color: var(--primary);
            box-shadow: 0 15px 35px rgba(255, 74, 110, 0.3);
        }

        .quote-text {
            font-family: var(--font-sinhala);
            font-size: 1.35rem;
            line-height: 1.6;
            color: #ffffff;
        }

        .copy-btn {
            background: var(--primary);
            border: none;
            color: white;
            padding: 10px 30px;
            border-radius: 50px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 700;
        }

        .copy-btn:hover {
            transform: scale(1.1);
        }

        .gallery-title {
            font-family: var(--font-sinhala);
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 60px;
            text-align: center;
        }

        .back-to-home {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 2100;
            background: var(--primary);
            border: none;
            color: white;
            padding: 14px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(255, 74, 110, 0.5);
        }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #00c853;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 700;
            opacity: 0;
            transition: all 0.3s;
            z-index: 3000;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            bottom: 60px;
        }

        .reveal-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: var(--primary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 9;
            opacity: 0;
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal-bg.active {
            width: 300vmax;
            height: 300vmax;
            opacity: 0.05;
        }

        /* Magic Reset Label */
        #reset-label {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            font-family: var(--font-sinhala);
            font-size: 2rem;
            color: var(--primary);
            opacity: 0;
            transition: all 1s ease;
            pointer-events: none;
            text-align: center;
            letter-spacing: 3px;
            font-weight: 700;
        }

        @media (max-width: 480px) {
            .btn-group {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 300px;
            }

            .gallery-title {
                font-size: 2rem;
            }

            .quote-text {
                font-size: 1.15rem;
            }

            .mystery-card {
                padding: 40px 20px;
            }

            .mystery-card h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>

    <div class="overlay"></div>
    <div id="toast" class="toast">අනුපිටපත් කරන ලදී! ❤️</div>
    <div id="reset-label">ආදරය හැමදාම සුරක්ෂිතයි... ❤️</div>
    <canvas id="particles-canvas"></canvas>
    <div class="reveal-bg" id="reveal-circle"></div>

    <button class="back-to-home" id="gallery-close" style="display:none;" onclick="hideGallery()">BACK ❤️</button>

    <div class="main-container" id="main-view">
        <div class="enchanted-heart" id="heart-btn" onclick="revealLove()">
            <div class="heart-aura"></div>
            <svg viewBox="0 0 24 24">
                <path
                    d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
            </svg>
        </div>
        <p class="instruction" id="hint-text">TOUCH THE HEART TO FEEL THE LOVE</p>

        <div class="mystery-card" id="card">
            <h1>සැබෑ ආදරය...🌹</h1>
            <div class="message-content" id="typed-text"></div>
            <p class="signature">🌹 සතුට බෙදාගන්න... ❤️</p>
            <div class="btn-group">
                <button class="btn" onclick="showGallery()">Wishes Gallery ✨</button>
                <button class="btn" id="close-btn"
                    style="background: transparent; border: 1px solid rgba(255,255,255,0.2);" onclick="resetView()">ආදරය
                    සුරකින්න</button>
            </div>
        </div>
    </div>

    <div class="gallery-section" id="gallery-view">
        <h2 class="gallery-title">ආදරණීය පණිවිඩ එකතුව... ❤️</h2>
        <div class="gallery-grid" id="gallery-grid"></div>
    </div>

    <script>
        const heartBtn = document.getElementById('heart-btn');
        const hintText = document.getElementById('hint-text');
        const card = document.getElementById('card');
        const revealCircle = document.getElementById('reveal-circle');
        const galleryView = document.getElementById('gallery-view');
        const galleryGrid = document.getElementById('gallery-grid');
        const mainView = document.getElementById('main-view');
        const galleryClose = document.getElementById('gallery-close');
        const toast = document.getElementById('toast');
        const typedContainer = document.getElementById('typed-text');
        const resetLabel = document.getElementById('reset-label');

        const fullMessage = "ජීවිතයේ අපට මුණගැසෙන වටිනාම සහ සුන්දරම තෑග්ග ආදරයයි. ඒ ආදරය තුළ තියෙන බැඳීම, සතුට සහ ආරක්ෂාව අපේ ලෝකයම ලස්සන කරනවා. ඔබේ ආදරණීයයා වෙනුවෙනුත් හදවතේ ඇති ඒ අසීමිත සෙනෙහස, අලුත් සංකල්පයකින් අද ඔහුට/ඇයට පවසන්න.";

        const romanticWishes = [
            "ඔබේ ආදරය මගේ ජීවිතයට ලැබුණු ලස්සනම තෑග්ගයි. ❤️",
            "හැමදාම මගේ ළඟින් ඉන්න, මගේ මුළු ලෝකයම ඔබයි. 🌹",
            "ඔබේ සිනහව මගේ දවසම ලස්සන කරනවා. ✨",
            "ජීවිතය කියන ගමනේ මම හොයපු ලස්සනම නැවතුම ඔබයි. 💖",
            "ඔබ මගේ හුස්ම තරමටම මට සමීපයි. ❤️",
            "සැබෑ ආදරය කියන්නේ ඔබ සහ මම අතර තියෙන මේ බැඳීමයි. 🌹",
            "ඔබ ඉන්න නිසා මගේ ලෝකය අද හරිම ලස්සනයි. ✨",
            "සංසාරේ පුරාවටම ඔබ මගේම වෙන්න කියලා මම ප්‍රාර්ථනා කරනවා. ❤️",
            "මගේ හදවතේ හැම ගැස්මක්ම ඔබ වෙනුවෙනුයි. 💖",
            "ඔබේ ආදරය මගේ ජීවිතයේ ශක්තියයි. 🌹",
            "You are my world, my heart, and my everything. ❤️",
            "Every moment with you is a beautiful dream come true. 🌹",
            "I love you more than words can ever express. ✨",
            "You're the reason behind every smile of mine. 💖",
            "I found my home in your heart. ❤️",
            "My love for you grows stronger with every heartbeat. 🌹",
            "Forever is a long time, but I want to spend it with you. ✨",
            "You are the best thing that ever happened to me. 💖",
            "Life is beautiful because you are in it. ❤️",
            "You make my heart skip a beat every single time. 🌹",
            "Having you by my side is my greatest blessing. ✨",
            "You are the magic that makes my life wonderful. 💖"
        ];

        function initGallery() {
            galleryGrid.innerHTML = "";
            romanticWishes.forEach(wish => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'quote-card';
                cardDiv.innerHTML = `<div class="quote-text">${wish}</div><button class="copy-btn" onclick="copyToClipboard('${wish.replace(/'/g, "\\'")}', this)">Copy ❤️</button>`;
                galleryGrid.appendChild(cardDiv);
            });
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.innerText;
                btn.innerText = 'Copied! ✨';
                showToast();
                setTimeout(() => { btn.innerText = originalText; }, 2000);
            });
        }

        function showToast() { toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2000); }
        function showGallery() { galleryView.classList.add('active'); galleryClose.style.display = 'block'; }
        function hideGallery() { galleryView.classList.remove('active'); galleryClose.style.display = 'none'; }

        let typingInterval;
        let isSpecialMode = false;
        let heartPoints = [];
        initGallery();

        function revealLove() {
            heartBtn.style.transform = 'scale(0) rotate(-45deg)';
            heartBtn.style.opacity = '0';
            hintText.style.opacity = '0';
            revealCircle.classList.add('active');
            setTimeout(() => { card.classList.add('active'); startTyping(); createBurstOnHeart(); }, 600);
        }

        function resetView() {
            isSpecialMode = true;
            document.body.classList.add('dark-mode');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px) scale(0.9)';
            generateHeartPoints();
            setTimeout(() => {
                resetLabel.style.opacity = '1';
                resetLabel.style.transform = 'translate(-50%, -50%) scale(1.2)';
            }, 500);
            setTimeout(() => {
                isSpecialMode = false;
                document.body.classList.remove('dark-mode');
                resetLabel.style.opacity = '0';
                resetLabel.style.transform = 'translate(-50%, -50%) scale(1)';
                card.classList.remove('active');
                revealCircle.classList.remove('active');
                typedContainer.textContent = "";
                clearTimeout(typingInterval);
                setTimeout(() => {
                    heartBtn.style.transform = 'scale(1) rotate(0deg)';
                    heartBtn.style.opacity = '1';
                    hintText.style.opacity = '1';
                }, 500);
            }, 6000);
        }

        function generateHeartPoints() {
            heartPoints = [];
            const scale = 15;
            const offsetX1 = canvas.width / 2 - 120;
            const offsetX2 = canvas.width / 2 + 120;
            const offsetY = canvas.height / 2;
            for (let t = 0; t < Math.PI * 2; t += 0.05) {
                let x1 = scale * (16 * Math.pow(Math.sin(t), 3));
                let y1 = -scale * (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                heartPoints.push({ x: x1 + offsetX1, y: y1 + offsetY });
                let x2 = scale * (16 * Math.pow(Math.sin(t), 3));
                let y2 = -scale * (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                heartPoints.push({ x: x2 + offsetX2, y: y2 + offsetY });
            }
        }

        function startTyping() {
            typedContainer.textContent = "";
            let i = 0;
            function type() {
                if (i < fullMessage.length) {
                    typedContainer.textContent += fullMessage.charAt(i);
                    i++;
                    typingInterval = setTimeout(type, 40);
                }
            }
            type();
        }

        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (isSpecialMode) generateHeartPoints();
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = (Math.random() * canvas.height);
                this.size = Math.random() * 2 + 0.5;
                this.speedY = Math.random() * -1 - 0.2;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.6 + 0.2;
                this.color = Math.random() > 0.3 ? '#ff4a6e' : '#ffffff';
                this.targetPoint = null;
            }
            update() {
                if (isSpecialMode && heartPoints.length > 0) {
                    if (!this.targetPoint) {
                        this.targetPoint = heartPoints[Math.floor(Math.random() * heartPoints.length)];
                    }
                    const dx = this.targetPoint.x - this.x;
                    const dy = this.targetPoint.y - this.y;
                    this.x += dx * 0.05;
                    this.y += dy * 0.05;
                    this.opacity = 0.8;
                    this.size = 1.5;
                } else {
                    this.targetPoint = null;
                    this.y += this.speedY;
                    this.x += this.speedX;
                    if (this.y < -10) {
                        this.y = canvas.height + 10;
                        this.x = Math.random() * canvas.width;
                    }
                }
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = isSpecialMode ? 10 : 0;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        for (let i = 0; i < 250; i++) particles.push(new Particle());
        animate();

        function createBurstOnHeart() {
            for (let i = 0; i < 30; i++) {
                const p = new Particle();
                p.x = canvas.width / 2; p.y = canvas.height / 2;
                p.speedY = (Math.random() - 0.5) * 10; p.speedX = (Math.random() - 0.5) * 10;
                particles.push(p);
                setTimeout(() => { const idx = particles.indexOf(p); if (idx > -1) particles.splice(idx, 1); }, 2000);
            }
        }
    </script>
</body>
