<!DOCTYPE html>
<html lang="si-LK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium New Year Gifts - සිරිත් විරිත් අවුරුදු තෑගි</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD700;
            --secondary: #FF4D00;
            --accent: #D4AF37;
            --dark: #1A0A00;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --font-main: 'Outfit', sans-serif;
            --font-si: 'Noto Sans Sinhala', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--dark);
            background-image: 
                radial-gradient(circle at 50% 50%, #3d1400 0%, #1A0A00 100%);
            font-family: var(--font-main);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        /* Decorative Background */
        .bg-decor {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .bloom {
            position: absolute;
            background: radial-gradient(circle, rgba(255, 77, 0, 0.15) 0%, transparent 70%);
            width: 600px;
            height: 600px;
            filter: blur(50px);
            animation: float 20s infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(-10%, -10%); }
            100% { transform: translate(10%, 10%); }
        }

        /* Header Section */
        header {
            text-align: center;
            padding: 60px 20px;
            opacity: 0;
            animation: fadeInDown 1s forwards ease-out;
        }

        .title-si {
            font-family: var(--font-si);
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(to bottom, #FFF, #BC9741);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .title-en {
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: var(--primary);
            text-transform: uppercase;
            font-weight: 300;
        }

        /* Gift Box Initial Landing */
        #gift-landing {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .gift-box-container {
            cursor: pointer;
            position: relative;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gift-box-container:hover {
            transform: scale(1.1);
        }

        .gift-box-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.4));
        }

        .gift-label {
            margin-top: 20px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* Wishes Interface */
        #wishes-interface {
            display: none;
            width: 100%;
            max-width: 1200px;
            padding: 40px 20px;
        }

        .wishes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }

        .wish-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            position: relative;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 20px;
            opacity: 0;
            transform: translateY(30px);
        }

        .wish-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .wish-card:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .wish-card::before {
            content: '✿';
            position: absolute;
            top: -10px;
            right: 15px;
            font-size: 4rem;
            color: var(--primary);
            opacity: 0.05;
        }

        .si-content {
            font-family: var(--font-si);
            font-size: 1.3rem;
            line-height: 1.6;
            color: #fff;
            font-weight: 400;
        }

        .en-content {
            font-size: 1rem;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.7);
            font-style: italic;
        }

        .copy-btn {
            background: linear-gradient(135deg, #FFD700 0%, #B8860B 100%);
            border: none;
            border-radius: 12px;
            padding: 12px;
            color: #000;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: auto;
        }

        .copy-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .copy-btn:active {
            transform: scale(0.98);
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .explode {
            animation: explode 0.8s forwards;
        }

        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.8; filter: brightness(2); }
            100% { transform: scale(0); opacity: 0; }
        }

        /* Custom Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #fff;
            color: #000;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            z-index: 1000;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .toast.active {
            transform: translateX(-50%) translateY(0);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .title-si { font-size: 2rem; }
            .gift-box-container { width: 220px; height: 220px; }
            .wishes-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-decor">
        <div class="bloom" style="top: 10%; left: 10%;"></div>
        <div class="bloom" style="bottom: 10%; right: 10%; background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);"></div>
    </div>

    <header id="main-header">
        <h1 class="title-si">සුබ අලුත් අවුරුද්දක් වේවා!</h1>
        <p class="title-en">Happy Sinhala & Tamil New Year</p>
    </header>

    <div id="gift-landing">
        <div class="gift-box-container" onclick="openGift()">
            <!-- Using the generated image -->
            <img src="gift_box.png" alt="Gift Box" class="gift-box-image" id="mystery-box">
        </div>
        <div class="gift-label" id="gift-instruction">මෙතැනින් ඔබේ තෑග්ග විවෘත කරන්න</div>
    </div>

    <div id="wishes-interface">
        <div style="text-align: center; margin-bottom: 40px;">
            <p style="color: var(--primary); font-size: 1.1rem; font-family: var(--font-si);">ඔබ වෙනුවෙන් සැකසූ සුවිශේෂී ප්‍රාර්ථනා 20ක්</p>
        </div>
        <div class="wishes-grid" id="wishes-grid">
            <!-- Wishes will be injected here -->
        </div>
        <div style="text-align: center; margin-top: 50px; padding-bottom: 100px;">
            <button onclick="location.reload()" style="background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 12px 30px; border-radius: 50px; cursor: pointer; font-family: var(--font-si);">නැවත විවෘත කරන්න</button>
        </div>
    </div>

    <div id="toast" class="toast">අවස්ථාව පිටපත් කළා! - Copied!</div>

    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        const wishes = [
            { 
                si: "ලැබුවා වූ සිංහල සහ දෙමළ අලුත් අවුරුද්ද ඔබගේ සියලු බලාපොරොත්තු ඉටු කෙරෙන, පවුලේ සැමට සාමය සහ සතුට සපිරි, නිරෝගී වාසනාවන්ත වසරක් වේවායි හදවතින්ම ප්‍රාර්ථනා කරමි!", 
                en: "As we welcome the Sinhala and Tamil New Year, I heartfully wish that all your aspirations and dreams come to fruition. May this new chapter bring boundless peace, joy, and robust health to you and your entire family." 
            },
            { 
                si: "කොවුල් නාදයත් සමඟ උදාවන මේ අසිරිමත් අලුත් අවුරුද්දේ, ඔබගේ ජීවිතයේ සියලු කරදර බාධක දුරුවී, සෞභාග්‍යයේ දොරටු විවර කරමින්, නව දැක්මකින් යුතුව ඉදිරියටම යෑමට ශක්තිය ධෛර්යය ලැබේවා!", 
                en: "With the melodious song of the Koha signaling a fresh start, may this auspicious New Year dissolve every obstacle in your path. May it open the doors of prosperity and empower you with the vision and courage to stride forward into a brilliant future." 
            },
            { 
                si: "සූර්යයා මීන රාශියෙන් මේෂ රාශියට සංක්‍රමණය වන්නා සේම, ඔබේ ජීවිතය ද නව ආලෝකයකින් සහ නව ජවයකින් ආලෝකමත් වේවා! අලුත් සිතුවිලි සහ අලුත් අරමුණු සමඟ සාර්ථකත්වයේ හිනිපෙත්තටම යෑමට මේ වසරේ ඔබට වරම් ලැබේවා!", 
                en: "Just as the sun transitions into Aries bringing light to the world, may your life be illuminated with fresh energy and divine radiance. May this year grant you the grace to reach the pinnacle of success with new thoughts and purposeful goals." 
            },
            { 
                si: "එරබදු මල් සිනහ සලන මේ සුන්දර වසන්තයේ, ඔබේ නිවසත් සිනහවෙන් සහ සතුටෙන් පිරී පවතීවා! කරුණාව, දයාව සහ මනුෂ්‍යත්වය පෙරදැරි කරගත් අර්ථාන්විත සුබ අලුත් අවුරුද්දක් ඔබටත් ඔබේ ආදරණීයයන්ටත් හිමිවේවා!", 
                en: "In this beautiful spring where the Erabadu flowers bloom with joy, may your home be filled with laughter and warmth. Wishing you and your loved ones a meaningful New Year rooted in kindness, compassion, and shared humanity." 
            },
            { 
                si: "පරණ වසරේ මතකයන් පසෙකලා, අලුත් බලාපොරොත්තු පොදියක් සමඟින් උදාවන මේ වාසනාවන්ත නව වසරේ, ඔබේ ජීවිතයට නව්‍යතාවයක් සහ සැබෑ සැනසීමක් උදා කර ගැනීමට අවශ්‍ය ශක්තිය නොඅඩුව ලැබේවායි පතමි!", 
                en: "Leaving behind the memories of the past, as you embrace a bundle of new hopes this fortunate New Year, I pray that you find the unwavering strength to bring novelty and true serenity into every aspect of your life." 
            },
            { 
                si: "කෙවුම්, කොකිස් සහ අතිරස සුවඳින් පිරි මේ සොඳුරු අවුරුදු සමයේ, ඔබේ ජීවිතය ද ඒ හා සමාන මිහිරියාවකින් සහ මිත්‍රශීලී බැඳීම්වලින් වර්ණවත් වේවා! පවුලේ සමගිය සහ සාමූහිකත්වය රජයන සුබ අලුත් අවුරුද්දක් වේවා!", 
                en: "In this festive season filled with the sweet aroma of traditional treats, may your life be equally colored with sweetness and meaningful bonds. Wishing you a New Year where family harmony and togetherness reign supreme." 
            },
            { 
                si: "ලබන්නා වූ නව වසර ඔබගේ ව්‍යාපාරික කටයුතු සහ වෘත්තීය ජීවිතය සාර්ථකත්වයෙන් සාර්ථකත්වයට පත් කරන, ආර්ථික සෞභාග්‍යය සහ පෞද්ගලික දියුණුව නොඅඩුව උදා කරන පින්බර වසරක් වේවායි ප්‍රාර්ථනා කරමි!", 
                en: "May the dawn of this New Year propel your career and business to new heights of success. Wishing you a year of immense economic prosperity, personal growth, and spiritual fulfillment in every endeavor." 
            },
            { 
                si: "අහස පුරා පිපිරෙන ගිනිකෙළි මෙන් ඔබේ ජීවිතයේ සතුට ද හැමතැනම විහිදී යත්වා! නිරෝගී සුවය උතුම්ම ධනය ලෙස සලකා, කය සහ මනස සුවපත් වන වාසනාවන්ත සුබ අලුත් අවුරුද්දක් ඔබ සැමට හිමිවේවා!", 
                en: "May the happiness in your life scatter far and wide like the fireworks lighting up the night sky. May you enjoy the ultimate wealth of good health, finding peace and healing for both your body and soul this New Year."

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 2500);
        }

        function copyWish(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                showToast();
                const originalText = btn.innerHTML;
                btn.innerHTML = '✓ Copied';
                btn.style.background = '#4CAF50';
                btn.style.color = '#fff';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.background = '';
                    btn.style.color = '';
                }, 2000);
            });
        }

        function openGift() {
            const box = document.getElementById('mystery-box');
            const landing = document.getElementById('gift-landing');
            const instruction = document.getElementById('gift-instruction');
            const header = document.getElementById('main-header');
            const wishesInterface = document.getElementById('wishes-interface');
            const grid = document.getElementById('wishes-grid');

            // 1. Shake animation
            box.parentElement.classList.add('shake');
            
            setTimeout(() => {
                // 2. Confetti effect
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#FFD700', '#FF4D00', '#D4AF37', '#ffffff']
                });

                // 3. Explode animation
                box.classList.add('explode');
                instruction.style.opacity = '0';
                
                setTimeout(() => {
                    landing.style.display = 'none';
                    wishesInterface.style.display = 'block';
                    
                    // Generate cards
                    wishes.forEach((wish, index) => {
                        const card = document.createElement('div');
                        card.className = 'wish-card';
                        card.innerHTML = `
                            <div class="si-content">${wish.si}</div>
                            <div class="en-content">${wish.en}</div>
                            <button class="copy-btn" onclick="copyWish('${wish.si}\\n${wish.en}', this)">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                Copy Wish
                            </button>
                        `;
                        grid.appendChild(card);
                        
                        // Staggered animation
                        setTimeout(() => {
                            card.classList.add('visible');
                        }, index * 100);
                    });
                }, 600);
            }, 500);
        }
